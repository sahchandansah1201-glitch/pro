server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /healthz {
    proxy_pass http://backend:3001/healthz;
  }

  location /readyz {
    proxy_pass http://backend:3001/readyz;
  }

  location /openapi.stage4a.json {
    proxy_pass http://backend:3001/openapi.stage4a.json;
  }

  location /openapi.stage4b.json {
    proxy_pass http://backend:3001/openapi.stage4b.json;
  }

  location /openapi.stage4c.json {
    proxy_pass http://backend:3001/openapi.stage4c.json;
  }

  location /openapi.stage4d.json {
    proxy_pass http://backend:3001/openapi.stage4d.json;
  }

  location /openapi.stage4g.json {
    proxy_pass http://backend:3001/openapi.stage4g.json;
  }

  location /openapi.stage4h.json {
    proxy_pass http://backend:3001/openapi.stage4h.json;
  }

  location /openapi.stage4i.json {
    proxy_pass http://backend:3001/openapi.stage4i.json;
  }

  location /openapi.stage4j.json {
    proxy_pass http://backend:3001/openapi.stage4j.json;
  }

  location /api/ {
    proxy_pass http://backend:3001/api/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
