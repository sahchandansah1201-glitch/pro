name: dermatolog-pro-stage4a

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ../../dist:/usr/share/nginx/html:ro
      - ./nginx.stage4a.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build:
      context: ../..
      dockerfile: backend/self-hosted/Dockerfile
    environment:
      BACKEND_PORT: "3001"
      DATABASE_URL: "postgres://dermatolog:${POSTGRES_PASSWORD:-dermatolog_local_password}@postgres:5432/dermatolog_pro"
      OBJECT_STORAGE_ENDPOINT: "http://object-storage:9000"
      OBJECT_STORAGE_BUCKET: "${OBJECT_STORAGE_BUCKET:-clinical-assets}"
      JWT_ISSUER: "dermatolog-pro-self-hosted"
      CORS_ORIGINS: "http://localhost:${APP_PORT:-8080},http://127.0.0.1:${APP_PORT:-8080}"
    depends_on:
      - postgres
      - object-storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dermatolog_pro
      POSTGRES_USER: dermatolog
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-dermatolog_local_password}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../backend/self-hosted/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dermatolog -d dermatolog_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  object-storage:
    image: minio/minio:RELEASE.2026-04-06T22-06-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-dermatolog_minio}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-dermatolog_minio_password}"
    volumes:
      - object-storage-data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

volumes:
  postgres-data:
  object-storage-data:
