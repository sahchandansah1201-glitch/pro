name: preflight-all

on:
  pull_request:
    paths:
      - "src/**"
      - "e2e/**"
      - "scripts/**"
      - "docs/architecture/**"
      - "docs/frontend/**"
      - "supabase/**"
      - "db/**"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  push:
    paths:
      - "src/**"
      - "e2e/**"
      - "scripts/**"
      - "docs/architecture/**"
      - "docs/frontend/**"
      - "supabase/**"
      - "db/**"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  preflight-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Preflight all script tests
        run: npm run test:preflight-all
      - name: Preflight all workflow gate tests
        run: npm run test:preflight-all-gate
      - name: Preflight all workflow gate
        run: npm run check:preflight-all-gate
      - name: Run deterministic preflight all
        run: npm run preflight:all -- --summary test-results/preflight-all.md
      - name: PR preflight summary
        if: always()
        run: |
          if [ -f test-results/preflight-all.md ]; then
            cat test-results/preflight-all.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Preflight all report"
              echo ""
              echo "- Status: \`missing-report\`"
              echo "- Expected: \`test-results/preflight-all.md\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload preflight report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-all-${{ github.run_id }}
          path: test-results/preflight-all.md
          if-no-files-found: warn
          retention-days: 7
