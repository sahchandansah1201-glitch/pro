name: no-deno-locks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Ensure no deno.lock files are committed
        run: node scripts/check-no-deno-locks.mjs
