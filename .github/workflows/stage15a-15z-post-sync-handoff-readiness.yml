name: stage15a-15z-post-sync-handoff-readiness

on:
  pull_request:
    paths:
      - "deploy/self-hosted/post-sync-handoff-readiness.stage15a-15z.json"
      - "docs/backend/stage-15a-15z-post-sync-handoff-readiness.md"
      - "docs/project-memory/**"
      - "scripts/stage15a-15z-post-sync-handoff-readiness.mjs"
      - "scripts/stage15a-15z-post-sync-handoff-readiness.test.mjs"
      - "scripts/check-stage15a-15z-post-sync-handoff-readiness.mjs"
      - "scripts/check-stage15a-15z-post-sync-handoff-readiness.test.mjs"
      - "scripts/preflight-all.mjs"
      - "scripts/preflight-all.test.mjs"
      - "package.json"
      - ".github/workflows/stage15a-15z-post-sync-handoff-readiness.yml"
  push:
    branches: [main]
    paths:
      - "deploy/self-hosted/post-sync-handoff-readiness.stage15a-15z.json"
      - "docs/backend/stage-15a-15z-post-sync-handoff-readiness.md"
      - "docs/project-memory/**"
      - "scripts/stage15a-15z-post-sync-handoff-readiness.mjs"
      - "scripts/stage15a-15z-post-sync-handoff-readiness.test.mjs"
      - "scripts/check-stage15a-15z-post-sync-handoff-readiness.mjs"
      - "scripts/check-stage15a-15z-post-sync-handoff-readiness.test.mjs"
      - "scripts/preflight-all.mjs"
      - "scripts/preflight-all.test.mjs"
      - "package.json"
      - ".github/workflows/stage15a-15z-post-sync-handoff-readiness.yml"
  workflow_dispatch:

jobs:
  stage15a-15z-post-sync-handoff-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stage 15A-15Z preflight
        run: npm run preflight:stage15a-15z

      - name: Summary
        if: always()
        run: |
          {
            echo "## Stage 15A-15Z post-sync handoff readiness"
            echo
            echo "- Command: \`npm run preflight:stage15a-15z\`"
            echo "- Result: ${{ job.status }}"
            echo "- Boundary: self-hosted product runtime unchanged"
          } >> "$GITHUB_STEP_SUMMARY"
