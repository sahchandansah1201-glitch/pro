name: doctor-hygiene-scan

# Регулярное сканирование запрещённых паттернов в doctor-контексте.
# Запускается на каждый push/PR и по расписанию (ежедневно в 03:00 UTC),
# чтобы своевременно ловить регрессии.

on:
  push:
    branches: [main]
    paths:
      - "src/pages/doctor/**"
      - "src/App.tsx"
      - "scripts/scan-doctor-forbidden.mjs"
      - ".github/workflows/doctor-hygiene-scan.yml"
  pull_request:
    paths:
      - "src/pages/doctor/**"
      - "src/App.tsx"
      - "scripts/scan-doctor-forbidden.mjs"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  scan:
    name: Сканирование doctor-контекста
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Запуск сканера
        run: node scripts/scan-doctor-forbidden.mjs
