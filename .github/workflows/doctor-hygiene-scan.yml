name: doctor-hygiene-scan

# Регулярное сканирование запрещённых паттернов в doctor-контексте.
# Запускается на каждый push/PR, по расписанию и вручную.
# Отчёт сохраняется как артефакт сборки (reports/doctor-hygiene/).

on:
  push:
    branches: [main]
    paths:
      - "src/pages/doctor/**"
      - "src/App.tsx"
      - "scripts/scan-doctor-forbidden.mjs"
      - "scripts/forbidden-patterns.mjs"
      - ".github/workflows/doctor-hygiene-scan.yml"
  pull_request:
    paths:
      - "src/pages/doctor/**"
      - "src/App.tsx"
      - "scripts/scan-doctor-forbidden.mjs"
      - "scripts/forbidden-patterns.mjs"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  scan:
    name: Сканирование doctor-контекста
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Запуск сканера
        id: scan
        run: node scripts/scan-doctor-forbidden.mjs

      - name: Публикация отчёта в GitHub Step Summary
        if: always()
        run: |
          if [ -f reports/doctor-hygiene/scan-report.md ]; then
            cat reports/doctor-hygiene/scan-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Загрузка артефакта отчёта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doctor-hygiene-scan-report
          path: reports/doctor-hygiene/
          if-no-files-found: warn
          retention-days: 30
