name: stage6l-production-release-archive-reconciliation-receipt

on:
  pull_request:
    paths:
      - "deploy/self-hosted/release-archive-reconciliation-receipt.stage6l.json"
      - "scripts/stage6l-production-release-archive-reconciliation-receipt.mjs"
      - "scripts/stage6l-production-release-archive-reconciliation-receipt.test.mjs"
      - "scripts/check-stage6l-production-release-archive-reconciliation-receipt.mjs"
      - "scripts/check-stage6l-production-release-archive-reconciliation-receipt.test.mjs"
      - "docs/backend/stage-6l-production-release-archive-reconciliation-receipt.md"
      - "package.json"
      - "scripts/preflight-all.mjs"
      - ".github/workflows/stage6l-production-release-archive-reconciliation-receipt.yml"
  push:
    branches: [main]
    paths:
      - "deploy/self-hosted/release-archive-reconciliation-receipt.stage6l.json"
      - "scripts/stage6l-production-release-archive-reconciliation-receipt.mjs"
      - "scripts/stage6l-production-release-archive-reconciliation-receipt.test.mjs"
      - "scripts/check-stage6l-production-release-archive-reconciliation-receipt.mjs"
      - "scripts/check-stage6l-production-release-archive-reconciliation-receipt.test.mjs"
      - "docs/backend/stage-6l-production-release-archive-reconciliation-receipt.md"
      - "package.json"
      - "scripts/preflight-all.mjs"
      - ".github/workflows/stage6l-production-release-archive-reconciliation-receipt.yml"

jobs:
  stage6l:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Stage 6L production release archive reconciliation receipt preflight
        run: npm run preflight:stage6l

      - name: Build Stage 6L production release archive reconciliation receipt report
        run: npm run receipt:stage6l:report

      - name: Upload Stage 6L production release archive reconciliation receipt
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage6l-production-release-archive-reconciliation-receipt
          path: |
            test-results/stage6l-production-release-archive-reconciliation-receipt.md
            test-results/stage6l-production-release-archive-reconciliation-receipt.json
          if-no-files-found: ignore

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Stage 6L production release archive reconciliation receipt"
            echo
            echo "- Preflight: completed"
            echo "- Report: stage6l-production-release-archive-reconciliation-receipt.md"
            echo "- Boundary: offline redacted archive reconciliation receipt schema, final receipt outcome outside git"
          } >> "$GITHUB_STEP_SUMMARY"
