name: release-status

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/release-status.mjs"
      - "scripts/release-status.test.mjs"
      - "scripts/check-release-status-privacy.mjs"
      - "scripts/check-release-status-privacy.test.mjs"
      - "scripts/check-release-status-sync.mjs"
      - "scripts/check-release-status-workflow-gate.mjs"
      - "scripts/check-release-status-workflow-gate.test.mjs"
      - "scripts/ci-release-status-sync-gate.test.mjs"
      - "scripts/ci-release-status-sync-gate.mjs"
      - "scripts/preflight-release-status.mjs"
      - "scripts/release-status-smoke.test.mjs"
      - "scripts/check-stage3-docs.mjs"
      - "src/lib/blob-utils.ts"
      - "src/lib/blob-utils.test.ts"
      - "src/lib/admin-access-events.ts"
      - "src/lib/release-status-ui.ts"
      - "src/lib/release-status-ui.test.ts"
      - "src/pages/sys/SysAccessEventsPage.tsx"
      - "src/pages/sys/SysAccessEventsPage.test.tsx"
      - "src/pages/sys/SysReleaseStatusPage.tsx"
      - "src/pages/sys/SysReleaseStatusPage.test.tsx"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "e2e/sys-release-status.pw.ts"
      - "docs/frontend/stage-3m-release-operations-dashboard.md"
      - "docs/frontend/stage-3i-final-documentation-index.md"
      - "docs/frontend/stage-3l-nightly-artifacts-report.md"
      - "docs/frontend/stage-3c-production-smoke.md"
      - "docs/frontend/stage-1i-auth-assets-readiness.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/release-status.yml"
  push:
    paths:
      - "scripts/release-status.mjs"
      - "scripts/release-status.test.mjs"
      - "scripts/check-release-status-privacy.mjs"
      - "scripts/check-release-status-privacy.test.mjs"
      - "scripts/check-release-status-sync.mjs"
      - "scripts/check-release-status-workflow-gate.mjs"
      - "scripts/check-release-status-workflow-gate.test.mjs"
      - "scripts/ci-release-status-sync-gate.test.mjs"
      - "scripts/ci-release-status-sync-gate.mjs"
      - "scripts/preflight-release-status.mjs"
      - "scripts/release-status-smoke.test.mjs"
      - "scripts/check-stage3-docs.mjs"
      - "src/lib/blob-utils.ts"
      - "src/lib/blob-utils.test.ts"
      - "src/lib/admin-access-events.ts"
      - "src/lib/release-status-ui.ts"
      - "src/lib/release-status-ui.test.ts"
      - "src/pages/sys/SysAccessEventsPage.tsx"
      - "src/pages/sys/SysAccessEventsPage.test.tsx"
      - "src/pages/sys/SysReleaseStatusPage.tsx"
      - "src/pages/sys/SysReleaseStatusPage.test.tsx"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "e2e/sys-release-status.pw.ts"
      - "docs/frontend/stage-3m-release-operations-dashboard.md"
      - "docs/frontend/stage-3i-final-documentation-index.md"
      - "docs/frontend/stage-3l-nightly-artifacts-report.md"
      - "docs/frontend/stage-3c-production-smoke.md"
      - "docs/frontend/stage-1i-auth-assets-readiness.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/release-status.yml"

permissions:
  actions: read
  contents: read

jobs:
  release-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Release-status local preflight
        run: npm run preflight:release-status

      - name: Release-status sync checker
        run: npm run check:release-status-sync

      - name: Release-status workflow gate
        run: npm run check:release-status-workflow-gate

      - name: Release-status CI sync gate
        run: npm run ci:release-status-sync

      - name: Write release status reports
        if: ${{ success() }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_STATUS_REPO: ${{ github.repository }}
        run: |
          mkdir -p test-results
          rm -f test-results/release-history.jsonl
          npm run release:status -- --output test-results/release-status.md --history test-results/release-history.jsonl
          npm run release:status:json -- --output test-results/release-status.json
          npm run release:status:html -- --output test-results/release-status.html
          npm run check:release-status-privacy -- \
            test-results/release-status.md \
            test-results/release-status.json \
            test-results/release-status.html \
            test-results/release-history.jsonl

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Release status"
            echo ""
            if [ -f test-results/release-status.md ]; then
              cat test-results/release-status.md
            else
              echo "release-status report was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release status reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-status-${{ github.run_id }}
          path: |
            test-results/release-status.md
            test-results/release-status.json
            test-results/release-status.html
            test-results/release-history.jsonl
          if-no-files-found: warn
          retention-days: 7
