name: stage4f-self-hosted-smoke-nightly

on:
  schedule:
    - cron: "27 3 * * *"
  workflow_dispatch:

jobs:
  docker-compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Prepare deploy env
        working-directory: deploy/self-hosted
        run: cp .env.example .env
      - name: Start self-hosted stack
        working-directory: deploy/self-hosted
        run: docker compose -f docker-compose.stage4a.yml up -d --build
      - name: Wait for /healthz
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz > /dev/null; then
              echo "healthz OK"
              exit 0
            fi
            sleep 2
          done
          echo "healthz did not become ready" >&2
          exit 1
      - name: Wait for /readyz
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/readyz > /dev/null; then
              echo "readyz OK"
              exit 0
            fi
            sleep 2
          done
          echo "readyz did not become ready" >&2
          exit 1
      - name: Verify /api/v1/patients requires auth
        run: |
          set -euo pipefail
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/patients)
          echo "GET /api/v1/patients without token -> $status"
          if [ "$status" != "401" ]; then
            echo "Expected 401 auth_required for unauthenticated patients call" >&2
            exit 1
          fi
      - name: Stop self-hosted stack
        if: always()
        working-directory: deploy/self-hosted
        run: docker compose -f docker-compose.stage4a.yml down -v
      - name: Summary
        if: always()
        run: |
          {
            echo "## Stage 4F self-hosted nightly smoke"
            echo ""
            echo "- compose: deploy/self-hosted/docker-compose.stage4a.yml"
            echo "- checked: /healthz, /readyz, GET /api/v1/patients (expect 401)"
            echo "- managed backend runtime: not used"
          } >> "$GITHUB_STEP_SUMMARY"
