name: stage6t-production-release-archive-retention-cycle-closure-receipt

on:
  pull_request:
    paths:
      - "deploy/self-hosted/release-archive-retention-cycle-closure-receipt.stage6t.json"
      - "scripts/stage6t-production-release-archive-retention-cycle-closure-receipt.mjs"
      - "scripts/stage6t-production-release-archive-retention-cycle-closure-receipt.test.mjs"
      - "scripts/check-stage6t-production-release-archive-retention-cycle-closure-receipt.mjs"
      - "scripts/check-stage6t-production-release-archive-retention-cycle-closure-receipt.test.mjs"
      - "docs/backend/stage-6t-production-release-archive-retention-cycle-closure-receipt.md"
      - "package.json"
      - "scripts/preflight-all.mjs"
      - ".github/workflows/stage6t-production-release-archive-retention-cycle-closure-receipt.yml"
  push:
    branches: [main]
    paths:
      - "deploy/self-hosted/release-archive-retention-cycle-closure-receipt.stage6t.json"
      - "scripts/stage6t-production-release-archive-retention-cycle-closure-receipt.mjs"
      - "scripts/stage6t-production-release-archive-retention-cycle-closure-receipt.test.mjs"
      - "scripts/check-stage6t-production-release-archive-retention-cycle-closure-receipt.mjs"
      - "scripts/check-stage6t-production-release-archive-retention-cycle-closure-receipt.test.mjs"
      - "docs/backend/stage-6t-production-release-archive-retention-cycle-closure-receipt.md"
      - "package.json"
      - "scripts/preflight-all.mjs"
      - ".github/workflows/stage6t-production-release-archive-retention-cycle-closure-receipt.yml"

jobs:
  stage6t:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Stage 6T production release archive retention cycle closure receipt preflight
        run: npm run preflight:stage6t

      - name: Build Stage 6T production release archive retention cycle closure receipt report
        run: npm run receipt:stage6t:report

      - name: Upload Stage 6T production release archive retention cycle closure receipt
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage6t-production-release-archive-retention-cycle-closure-receipt
          path: |
            test-results/stage6t-production-release-archive-retention-cycle-closure-receipt.md
            test-results/stage6t-production-release-archive-retention-cycle-closure-receipt.json
          if-no-files-found: ignore

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Stage 6T production release archive retention cycle closure receipt"
            echo
            echo "- Preflight: completed"
            echo "- Report: stage6t-production-release-archive-retention-cycle-closure-receipt.md"
            echo "- Boundary: offline redacted archive retention cycle closure receipt schema, final receipt outcome outside git"
          } >> "$GITHUB_STEP_SUMMARY"
