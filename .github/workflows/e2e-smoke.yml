name: e2e-smoke

on:
  pull_request:
    paths:
      - "e2e/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "docs/frontend/stage-3c-production-smoke.md"
      - ".github/workflows/e2e-smoke.yml"
  push:
    paths:
      - "e2e/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "docs/frontend/stage-3c-production-smoke.md"
      - ".github/workflows/e2e-smoke.yml"
  workflow_dispatch:
    inputs:
      auth_smoke:
        description: "Auth-assets smoke behavior"
        required: true
        default: "skip"
        type: choice
        options:
          - "skip"
          - "off"
      upload_artifacts:
        description: "Artifact upload policy"
        required: true
        default: "failure"
        type: choice
        options:
          - "failure"
          - "always"
          - "never"

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AUTH_SMOKE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.auth_smoke || 'skip' }}
      SMOKE_ARTIFACT_NAME: e2e-smoke-report-${{ github.run_id }}
      SMOKE_RETRIES: "1"
      SMOKE_UPLOAD_ARTIFACTS: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_artifacts || 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start Vite
        run: |
          set -euo pipefail
          mkdir -p test-results
          npm run dev -- --host 127.0.0.1 --port 8080 > test-results/e2e-smoke-vite.log 2>&1 &
          echo "$!" > /tmp/e2e-smoke-vite.pid
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:8080 >/dev/null; then
              echo "Vite is ready on http://127.0.0.1:8080"
              exit 0
            fi
            sleep 1
          done
          cat test-results/e2e-smoke-vite.log
          exit 1
      - name: Run fast e2e smoke
        run: |
          set -euo pipefail
          smoke_args=(--reporter=list,html --retries="$SMOKE_RETRIES" --trace=retain-on-failure)
          if [ "$AUTH_SMOKE_MODE" = "off" ]; then
            npm run e2e:smoke:no-auth -- "${smoke_args[@]}"
          else
            npm run e2e:smoke -- "${smoke_args[@]}"
          fi
      - name: Upload smoke report and failure artifacts
        if: always() && (env.SMOKE_UPLOAD_ARTIFACTS == 'always' || (env.SMOKE_UPLOAD_ARTIFACTS == 'failure' && failure()))
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SMOKE_ARTIFACT_NAME }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 7
      - name: Stop Vite
        if: always()
        run: |
          if [ -f /tmp/e2e-smoke-vite.pid ]; then
            kill "$(cat /tmp/e2e-smoke-vite.pid)" || true
          fi
      - name: Post PR smoke summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          SMOKE_JOB_STATUS: ${{ job.status }}
          SMOKE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SMOKE_ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
        with:
          script: |
            const marker = "<!-- e2e-smoke-summary -->";
            const uploadMode = process.env.SMOKE_UPLOAD_ARTIFACTS;
            const result = process.env.SMOKE_JOB_STATUS;
            const artifactWasUploaded =
              uploadMode === "always" || (uploadMode === "failure" && result !== "success");
            const artifactLine = artifactWasUploaded
              ? `[${process.env.SMOKE_ARTIFACT_NAME}](${process.env.SMOKE_ARTIFACT_URL})`
              : `not uploaded (policy: \`${uploadMode}\`, result: \`${result}\`)`;
            const body = [
              marker,
              "## e2e-smoke summary",
              `- Result: \`${result}\``,
              `- Mode: \`${process.env.AUTH_SMOKE_MODE}\``,
              `- Retries: \`${process.env.SMOKE_RETRIES}\``,
              `- Artifact policy: \`${uploadMode}\``,
              `- Artifact: ${artifactLine}`,
              `- Run: ${process.env.SMOKE_RUN_URL}`,
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find(
              (comment) => comment.user?.type === "Bot" && comment.body?.includes(marker),
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
      - name: Job summary
        if: always()
        run: |
          {
            echo "## e2e-smoke"
            echo ""
            echo "- Command mode: \`$AUTH_SMOKE_MODE\`"
            echo "- Default mode \`skip\` includes \`auth-assets-smoke\` without credentials; its skip is expected."
            echo "- Mode \`off\` runs only demo/local smoke specs."
            echo "- Retries: \`$SMOKE_RETRIES\`"
            echo "- Visual-regression screenshot specs are excluded."
            echo "- Artifact policy: \`$SMOKE_UPLOAD_ARTIFACTS\`"
            if [ "$SMOKE_UPLOAD_ARTIFACTS" = "always" ] || { [ "$SMOKE_UPLOAD_ARTIFACTS" = "failure" ] && [ "${{ job.status }}" != "success" ]; }; then
              echo "- Artifact: [$SMOKE_ARTIFACT_NAME](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)"
            else
              echo "- Artifact: not uploaded for this successful run"
            fi
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
