name: typecheck

on:
  pull_request:
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "scripts/**/*.mjs"
      - "e2e/**/*.ts"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/typecheck.yml"
  push:
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "scripts/**/*.mjs"
      - "e2e/**/*.ts"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/typecheck.yml"
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Job summary
        if: always()
        run: |
          {
            echo "## typecheck"
            echo ""
            echo "- Command: \`npm run typecheck\`"
            echo "- Coverage: TypeScript project build mode for app and node configs"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
