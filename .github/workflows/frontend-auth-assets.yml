name: frontend-auth-assets

on:
  pull_request:
    paths:
      - "src/lib/supabase-client.ts"
      - "src/lib/use-api-session.ts"
      - "src/lib/api-session.ts"
      - "src/lib/auth-role.ts"
      - "src/lib/clinical-assets-api.ts"
      - "src/context/**"
      - "src/components/auth/**"
      - "src/components/shell/RoleGuard.tsx"
      - "src/components/shell/RoleSwitcher.tsx"
      - "src/pages/Login.tsx"
      - "src/pages/doctor/VisitWorkspacePage.tsx"
      - "src/pages/doctor/VisitImagingTab.tsx"
      - "src/pages/doctor/VisitWorkspacePage.test.tsx"
      - "src/pages/doctor/VisitImagingTab.test.tsx"
      - "src/pages/doctor/VisitImagingTab.hygiene.test.ts"
      - "scripts/scan-doctor-forbidden.mjs"
      - "scripts/forbidden-patterns.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-auth-assets.yml"
  push:
    paths:
      - "src/lib/supabase-client.ts"
      - "src/lib/use-api-session.ts"
      - "src/lib/api-session.ts"
      - "src/lib/auth-role.ts"
      - "src/lib/clinical-assets-api.ts"
      - "src/context/**"
      - "src/components/auth/**"
      - "src/components/shell/RoleGuard.tsx"
      - "src/components/shell/RoleSwitcher.tsx"
      - "src/pages/Login.tsx"
      - "src/pages/doctor/VisitWorkspacePage.tsx"
      - "src/pages/doctor/VisitImagingTab.tsx"
      - "src/pages/doctor/VisitWorkspacePage.test.tsx"
      - "src/pages/doctor/VisitImagingTab.test.tsx"
      - "src/pages/doctor/VisitImagingTab.hygiene.test.ts"
      - "scripts/scan-doctor-forbidden.mjs"
      - "scripts/forbidden-patterns.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-auth-assets.yml"
  workflow_dispatch:

jobs:
  frontend-auth-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: supabase-client
        run: npm test -- --run src/lib/supabase-client.test.ts
      - name: AuthContext
        run: npm test -- --run src/context/AuthContext.test.tsx
      - name: LoginForm
        run: npm test -- --run src/components/auth/LoginForm.test.tsx
      - name: Login page
        run: npm test -- --run src/pages/Login.test.tsx
      - name: RoleGuard
        run: npm test -- --run src/components/shell/RoleGuard.test.tsx
      - name: RoleSwitcher
        run: npm test -- --run src/components/shell/RoleSwitcher.test.tsx
      - name: use-api-session
        run: npm test -- --run src/lib/use-api-session.test.tsx
      - name: auth-role
        run: npm test -- --run src/lib/auth-role.test.ts
      - name: clinical-assets-api
        run: npm test -- --run src/lib/clinical-assets-api.test.ts
      - name: VisitWorkspacePage
        run: npm test -- --run src/pages/doctor/VisitWorkspacePage.test.tsx
      - name: VisitImagingTab
        run: npm test -- --run src/pages/doctor/VisitImagingTab.test.tsx
      - name: VisitImagingTab hygiene
        run: npm test -- --run src/pages/doctor/VisitImagingTab.hygiene.test.ts
      - name: Doctor forbidden scan
        run: node scripts/scan-doctor-forbidden.mjs
      - name: Build
        run: npm run build
      - name: No deno.lock files
        run: node scripts/check-no-deno-locks.mjs
