name: frontend-auth-assets

on:
  pull_request:
    paths:
      - "src/lib/supabase-client.ts"
      - "src/lib/use-api-session.ts"
      - "src/lib/api-session.ts"
      - "src/lib/auth-role.ts"
      - "src/lib/clinical-assets-api.ts"
      - "src/context/**"
      - "src/components/auth/**"
      - "src/components/shell/RoleGuard.tsx"
      - "src/components/shell/RoleSwitcher.tsx"
      - "src/pages/Login.tsx"
      - "src/pages/doctor/VisitWorkspacePage.tsx"
      - "src/pages/doctor/VisitImagingTab.tsx"
      - "src/pages/doctor/VisitWorkspacePage.test.tsx"
      - "src/pages/doctor/VisitImagingTab.test.tsx"
      - "src/pages/doctor/VisitImagingTab.hygiene.test.ts"
      - "scripts/scan-doctor-forbidden.mjs"
      - "scripts/forbidden-patterns.mjs"
      - "scripts/check-no-deno-locks.mjs"
      - "scripts/preflight-auth-assets.mjs"
      - "docs/frontend/stage-1i-auth-assets-readiness.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-auth-assets.yml"
  push:
    paths:
      - "src/lib/supabase-client.ts"
      - "src/lib/use-api-session.ts"
      - "src/lib/api-session.ts"
      - "src/lib/auth-role.ts"
      - "src/lib/clinical-assets-api.ts"
      - "src/context/**"
      - "src/components/auth/**"
      - "src/components/shell/RoleGuard.tsx"
      - "src/components/shell/RoleSwitcher.tsx"
      - "src/pages/Login.tsx"
      - "src/pages/doctor/VisitWorkspacePage.tsx"
      - "src/pages/doctor/VisitImagingTab.tsx"
      - "src/pages/doctor/VisitWorkspacePage.test.tsx"
      - "src/pages/doctor/VisitImagingTab.test.tsx"
      - "src/pages/doctor/VisitImagingTab.hygiene.test.ts"
      - "scripts/scan-doctor-forbidden.mjs"
      - "scripts/forbidden-patterns.mjs"
      - "scripts/check-no-deno-locks.mjs"
      - "scripts/preflight-auth-assets.mjs"
      - "docs/frontend/stage-1i-auth-assets-readiness.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-auth-assets.yml"
  workflow_dispatch:

jobs:
  frontend-auth-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Auth/assets preflight
        run: npm run preflight:auth-assets
      - name: Job summary
        if: always()
        run: |
          {
            echo "## frontend-auth-assets"
            echo ""
            echo "- Command: \`npm run preflight:auth-assets\`"
            echo "- Coverage: auth/assets unit suites, doctor hygiene scan, Vite build, deno.lock guard"
            echo "- Environment: no Supabase env vars, no Deno, no Playwright"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

