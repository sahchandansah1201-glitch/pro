name: stage6v-production-release-archive-retention-cycle-final-closure-receipt

on:
  pull_request:
    paths:
      - "deploy/self-hosted/release-archive-retention-cycle-final-closure-receipt.stage6v.json"
      - "scripts/stage6v-production-release-archive-retention-cycle-final-closure-receipt.mjs"
      - "scripts/stage6v-production-release-archive-retention-cycle-final-closure-receipt.test.mjs"
      - "scripts/check-stage6v-production-release-archive-retention-cycle-final-closure-receipt.mjs"
      - "scripts/check-stage6v-production-release-archive-retention-cycle-final-closure-receipt.test.mjs"
      - "docs/backend/stage-6v-production-release-archive-retention-cycle-final-closure-receipt.md"
      - "package.json"
      - "scripts/preflight-all.mjs"
      - ".github/workflows/stage6v-production-release-archive-retention-cycle-final-closure-receipt.yml"
  push:
    branches: [main]
    paths:
      - "deploy/self-hosted/release-archive-retention-cycle-final-closure-receipt.stage6v.json"
      - "scripts/stage6v-production-release-archive-retention-cycle-final-closure-receipt.mjs"
      - "scripts/stage6v-production-release-archive-retention-cycle-final-closure-receipt.test.mjs"
      - "scripts/check-stage6v-production-release-archive-retention-cycle-final-closure-receipt.mjs"
      - "scripts/check-stage6v-production-release-archive-retention-cycle-final-closure-receipt.test.mjs"
      - "docs/backend/stage-6v-production-release-archive-retention-cycle-final-closure-receipt.md"
      - "package.json"
      - "scripts/preflight-all.mjs"
      - ".github/workflows/stage6v-production-release-archive-retention-cycle-final-closure-receipt.yml"

jobs:
  stage6v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Stage 6V production release archive retention cycle final closure receipt preflight
        run: npm run preflight:stage6v

      - name: Build Stage 6V production release archive retention cycle final closure receipt report
        run: npm run receipt:stage6v:report

      - name: Upload Stage 6V production release archive retention cycle final closure receipt
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage6v-production-release-archive-retention-cycle-final-closure-receipt
          path: |
            test-results/stage6v-production-release-archive-retention-cycle-final-closure-receipt.md
            test-results/stage6v-production-release-archive-retention-cycle-final-closure-receipt.json
          if-no-files-found: ignore

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Stage 6V production release archive retention cycle final closure receipt"
            echo
            echo "- Preflight: completed"
            echo "- Report: stage6v-production-release-archive-retention-cycle-final-closure-receipt.md"
            echo "- Boundary: offline redacted archive retention cycle final closure receipt schema, final receipt outcome outside git"
          } >> "$GITHUB_STEP_SUMMARY"
